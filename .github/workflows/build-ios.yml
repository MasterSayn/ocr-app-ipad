name: Build Flet iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Inject Secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          path = 'ipad_app/main.py'
          content = open(path).read()
          content = content.replace('HF_TOKEN_PLACEHOLDER', os.environ.get('HF_TOKEN', ''))
          open(path, 'w').write(content)
          "

      - name: Build iOS app (Unsigned IPA)
        run: |
          # Run Flet build ipa in the ipad_app directory.
          # We pass --no-codesign to Flutter to allow building without a developer account.
          # We pipe "yes" to automatically accept downloading the required Flutter SDK.
          yes | flet build ipa ipad_app --flutter-build-args="--no-codesign" --info-plist UIFileSharingEnabled=true --info-plist LSSupportsOpeningDocumentsInPlace=true --info-plist CFBundleDocumentTypes="[{CFBundleTypeName='PDF Document', LSHandlerRank='Alternate', LSItemContentTypes=['com.adobe.pdf'], CFBundleTypeRole='Viewer'}]"

      - name: List all files in workspace
        run: |
          find . -maxdepth 5 -not -path '*/.*' -not -path '*/Library*' -not -path '*/HostedToolCache*'

      - name: Locate and Package IPA
        run: |
          # Because codesigning is disabled, Xcode builds a .xcarchive instead of .ipa.
          # We manually package the .app folder from the xcarchive into an unsigned .ipa (Payload zip).
          mkdir -p output
          mkdir -p Payload
          cp -r ipad_app/build/ipa/ipad_app.xcarchive/Products/Applications/*.app Payload/
          zip -r output/mathocr.ipa Payload
          rm -rf Payload
          ls -R output

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathocr-unsigned-ipa
          path: output/mathocr.ipa
